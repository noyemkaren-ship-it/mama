<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Поздравление с 8 марта</title>
<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffd1dc);
        overflow: hidden;
        position: relative;
        padding: 16px;
    }

    .link {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 22px;
        background: linear-gradient(135deg, #d63384, #ff5ca8);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-size: 18px;
        box-shadow: 0 8px 18px rgba(214, 51, 132, 0.22);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .link:hover,
    .link:active {
        transform: scale(1.05);
        box-shadow: 0 10px 22px rgba(214, 51, 132, 0.3);
    }

    .hearts {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        top: 0;
        left: 0;
        z-index: 0;
        pointer-events: none;
    }

    .heart {
        position: absolute;
        bottom: -20px;
        color: rgba(255, 105, 180, 0.4);
        font-size: 20px;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(0) scale(1);
            opacity: 0;
        }
        10% {
            opacity: 1;
        }
        100% {
            transform: translateY(-110vh) scale(1.5);
            opacity: 0;
        }
    }

    .card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 520px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(10px);
        border-radius: 28px;
        padding: 36px 24px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(214, 51, 132, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.6);
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        margin: 0 0 14px;
        font-size: 34px;
        line-height: 1.2;
        color: #d63384;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.08);
    }

    h2 {
        margin: 0 0 28px;
        font-size: 26px;
        line-height: 1.3;
        color: #8a295d;
        font-weight: 600;
    }

    .flowers {
        font-size: 32px;
        margin-bottom: 18px;
    }

    .buttons {
        position: relative;
        width: 100%;
        height: 130px;
        max-width: 320px;
        margin: 0 auto;
    }

    button {
        padding: 14px 30px;
        font-size: 20px;
        font-weight: bold;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: 0.25s ease;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        touch-action: manipulation;
    }

    #yes {
        background: linear-gradient(135deg, #ff4fa3, #ff85b3);
        color: white;
    }

    #yes:hover,
    #yes:active {
        transform: scale(1.08);
        box-shadow: 0 10px 22px rgba(255, 79, 163, 0.35);
    }

    #no {
        background: linear-gradient(135deg, #8e8e8e, #b5b5b5);
        color: white;
        position: absolute;
        left: 58%;
        top: 0;
    }

    #result {
        margin-top: 20px;
        font-size: 24px;
        color: #c2185b;
        font-weight: bold;
        min-height: 35px;
        line-height: 1.3;
        animation: pulse 1s infinite alternate;
        padding: 0 8px;
    }

    @keyframes pulse {
        from {
            transform: scale(1);
        }
        to {
            transform: scale(1.03);
        }
    }

    .yes-wrap {
        position: absolute;
        left: 10%;
        top: 0;
    }

    @media (max-width: 600px) {
        body {
            padding: 12px;
            align-items: center;
        }

        .card {
            padding: 28px 18px;
            border-radius: 22px;
        }

        .flowers {
            font-size: 28px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 28px;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 24px;
        }

        .buttons {
            height: 150px;
            max-width: 280px;
        }

        button {
            font-size: 18px;
            padding: 12px 22px;
        }

        .yes-wrap {
            left: 4%;
            top: 8px;
        }

        #no {
            left: 58%;
            top: 8px;
        }

        #result {
            font-size: 20px;
            min-height: 54px;
        }

        .link {
            width: 100%;
            max-width: 260px;
            font-size: 17px;
        }
    }

    @media (max-width: 380px) {
        h1 {
            font-size: 24px;
        }

        h2 {
            font-size: 19px;
        }

        button {
            font-size: 16px;
            padding: 11px 18px;
        }

        .buttons {
            max-width: 240px;
            height: 140px;
        }

        #result {
            font-size: 18px;
        }
    }
</style>
</head>
<body>

<div class="hearts">
    <span class="heart" style="left: 10%; animation-duration: 7s; font-size: 22px;">❤</span>
    <span class="heart" style="left: 20%; animation-duration: 9s; font-size: 18px;">❤</span>
    <span class="heart" style="left: 35%; animation-duration: 6s; font-size: 26px;">❤</span>
    <span class="heart" style="left: 50%; animation-duration: 8s; font-size: 20px;">❤</span>
    <span class="heart" style="left: 65%; animation-duration: 7s; font-size: 24px;">❤</span>
    <span class="heart" style="left: 80%; animation-duration: 10s; font-size: 19px;">❤</span>
    <span class="heart" style="left: 90%; animation-duration: 6.5s; font-size: 23px;">❤</span>
</div>

<div class="card">
    <div class="flowers">🌷 💖 🌸</div>
    <h1>Вика, ответь на вопрос!!</h1>
    <h2>Как ты думаешь, люблю ли я тебя?</h2>

    <div class="buttons">
        <div class="yes-wrap">
            <button id="yes" onclick="love()">Да</button>
        </div>
        <button id="no">Нет</button>
    </div>

    <p id="result"></p>

    <p>Создатель Карен</p>
</div>

<script>
function love() {
    document.getElementById("result").innerHTML = "Конечно люблю тебя очень сильно ❤️";
}

function moveButton() {
    const btn = document.getElementById("no");
    const area = document.querySelector(".buttons");

    const maxX = area.clientWidth - btn.offsetWidth;
    const maxY = area.clientHeight - btn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moveButton();
});
noBtn.addEventListener("click", function(e) {
    e.preventDefault();
    moveButton();
});
</script>

</body>
</html>
