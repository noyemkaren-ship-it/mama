<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Открытки для мамы</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6e7,#ffeef5);
    margin:0;
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h2{
    color:#d63384;
}

.emoji{
    font-size:28px;
}
</style>

</head>
<body>

<h1>Открытки для мамы 💖</h1>

{% for i in otkritka %}

<div class="card">

<div class="emoji">
{{ i.emoji }}
</div>

<h2>
{{ i.title }}
</h2>

<p>
{{ i.text }}
</p>

</div>

{% endfor %}

</body>
</html>
